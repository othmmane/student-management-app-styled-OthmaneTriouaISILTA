services:
  mysql:
    image: mysql:8.4
    container_name: sma-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_db
      MYSQL_USER: student_user
      MYSQL_PASSWORD: student_pass
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: sma-web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: student_db
      DB_USER: student_user
      DB_PASSWORD: student_pass

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: sma-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8083:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

volumes:
  mysql_data: